name: publish-pypi

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.0)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish wisechef-recipes to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify version match
        run: |
          set -e
          ref="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          tag_version="${ref#v}"
          pkg_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::pyproject.toml version ($pkg_version) does not match tag ($tag_version)"
            exit 1
          fi
          echo "✓ version $pkg_version matches tag $ref"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Smoke-test wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          /tmp/smoke/bin/recipes --help | head -5

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --non-interactive dist/*
