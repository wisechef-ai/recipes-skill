name: skill-quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: skill-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-mode-gate:
    name: Quality gate (--publish mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run quality gate (publish mode, JSON output)
        id: gate
        run: |
          set +e
          python .github/skill_quality_gate.py . --publish --json > gate_report.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload gate report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-quality-gate-report
          path: gate_report.json
          retention-days: 30

      - name: Print human-readable summary
        if: always()
        run: |
          python .github/skill_quality_gate.py . --publish || true

      - name: PR comment with findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('gate_report.json', 'utf8'));
            const s = report.summary;
            const verdict = s.by_severity.block > 0
              ? '❌ **BLOCKED** — must fix before merge'
              : s.by_severity.warn > 0
              ? '⚠️ **WARNINGS** — review required'
              : '✅ **CLEAN**';
            const top = (report.findings || []).slice(0, 10).map(f =>
              `- \`${f.severity.toUpperCase()}\` **${f.category}** — \`${f.file_path}:${f.line_no || '-'}\` — ${f.rationale}`
            ).join('\n') || '_No findings._';
            const body = [
              `## Skill Quality Gate (publish mode)`,
              ``,
              verdict,
              ``,
              `**Total:** ${s.total}  |  **Block:** ${s.by_severity.block}  |  **Warn:** ${s.by_severity.warn}  |  **Info:** ${s.by_severity.info}`,
              ``,
              `**Top findings:**`,
              top,
              ``,
              `_Sources scanned: ${Object.keys(s.by_source).join(', ') || 'none'}_`,
              `_Full report attached as artifact \`skill-quality-gate-report\`._`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if gate blocked
        if: steps.gate.outputs.exit_code == '2'
        run: |
          echo "❌ Quality gate found BLOCK-level findings. See report above."
          exit 1

      - name: Warn if gate emitted warnings
        if: steps.gate.outputs.exit_code == '1'
        run: |
          echo "⚠️ Quality gate emitted warnings (non-blocking). Review before merge."
